# Migration config example — SAS financial analytics to Databricks
#
# This example maps a legacy SAS environment (risklib) to the Bronze layer
# of the Databricks medallion pipeline used in this project.
#
# Source SAS libraries contained:
#   risklib — read-only market data (prices, rates)
#   outlib  — write target for processed datasets
#
# Target: Databricks with Unity Catalog enabled (financial_sas_project catalog)
source:
  library_mappings:
    risklib: financial_sas_project.default
    outlib: financial_sas_project.default
  dataset_mappings:
    risklib.sp500_prices:  financial_sas_project.default.bronze_sp500
    risklib.eurostoxx:     financial_sas_project.default.bronze_eurostoxx
    risklib.vix:           financial_sas_project.default.bronze_vix
    risklib.fed_rate:      financial_sas_project.default.bronze_fed_rate
    risklib.ecb_rate:      financial_sas_project.default.bronze_ecb_rate
    outlib.daily_market:   financial_sas_project.default.silver_market
    outlib.analytics:      financial_sas_project.default.gold_analytics
  macro_vars:
    start_date: "2010-01-01"
    end_date: "2025-12-31"
    report_year: "2024"
    vol_window_short: "20"
    vol_window_long: "60"
target:
  platform: enterprise
  catalog: financial_sas_project
  default_schema: default
  unity_catalog: true
